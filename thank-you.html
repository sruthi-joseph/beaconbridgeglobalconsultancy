<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Beacon Bridge Global Consultancy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-light);">

    <div class="reveal active"
        style="text-align: center; background: white; padding: 60px; border-radius: 30px; box-shadow: var(--shadow-lg); max-width: 600px; width: 90%;">
        <div style="margin-bottom: 30px; display: flex; justify-content: center;">
            <img src="logo.png" alt="Beacon Bridge Global Consultancy" style="height: 80px; mix-blend-mode: multiply;">
        </div>
        <div class="hover-scale"
            style="background: var(--success); color: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 30px; transition: var(--transition);">
            <i class="fas fa-check"></i>
        </div>
        <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Thank You!</h1>
        <p style="font-size: 1.2rem; color: var(--text-light); margin-bottom: 40px;">Your inquiry has been successfully
            received. One of our expert consultants will contact you within 24 hours to schedule your free session.</p>

        <div class="hover-lift"
            style="background: var(--bg-light); padding: 25px; border-radius: 15px; margin-bottom: 40px; transition: var(--transition);">
            <p style="font-weight: 600; color: var(--primary);">Need an immediate answer?</p>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Chat with us on WhatsApp for instant guidance.</p>
            <a href="#" class="btn btn-primary hover-scale"
                style="background: #25d366; border: none; animation: pulse-glow 2s infinite;"><i class="fab fa-whatsapp"
                    style="margin-right: 10px;"></i> Chat on WhatsApp</a>
        </div>

        <a href="index.html" style="color: var(--primary); font-weight: 600; text-decoration: underline;">Back to
            Homepage</a>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
